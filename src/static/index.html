<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio QA Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 2rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: #8b949e;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  /* Upload area */
  .upload-area {
    border: 2px dashed #30363d;
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1.5rem;
  }

  .upload-area:hover, .upload-area.dragover {
    border-color: #58a6ff;
    background: rgba(88, 166, 255, 0.05);
  }

  .upload-area.processing {
    border-color: #d29922;
    cursor: wait;
  }

  .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .upload-text { color: #8b949e; font-size: 0.9rem; }
  .upload-text strong { color: #58a6ff; }

  input[type="file"] { display: none; }

  /* Results */
  .results { display: none; }
  .results.visible { display: block; }

  .section {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8b949e;
    margin-bottom: 0.75rem;
  }

  .track-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .track-name { font-size: 1.1rem; font-weight: 600; }

  .track-meta {
    color: #8b949e;
    font-size: 0.85rem;
  }

  /* Metric rows */
  .metric-row {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    font-size: 0.9rem;
  }

  .metric-label { color: #8b949e; }
  .metric-value { font-weight: 500; font-variant-numeric: tabular-nums; }

  /* Platform table */
  .platform-row {
    display: grid;
    grid-template-columns: 24px 1fr 1fr 80px;
    gap: 0.5rem;
    align-items: center;
    padding: 0.5rem 0;
    font-size: 0.9rem;
    border-bottom: 1px solid #21262d;
  }

  .platform-row:last-child { border-bottom: none; }

  .platform-name { font-weight: 500; }

  .platform-delta {
    color: #8b949e;
    font-size: 0.85rem;
  }

  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    text-align: center;
  }

  .badge-pass { background: #0d3117; color: #3fb950; }
  .badge-warning { background: #2d2000; color: #d29922; }
  .badge-fail { background: #3d1214; color: #f85149; }

  /* Actions */
  .action-bar {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .action-msg {
    font-size: 0.9rem;
    padding: 0.5rem 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #e6edf3;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }

  .btn:hover { background: #30363d; }

  .btn-primary {
    background: #238636;
    border-color: #2ea043;
  }

  .btn-primary:hover { background: #2ea043; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Clipping */
  .clip-detail { font-size: 0.85rem; color: #8b949e; margin-top: 0.25rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Audio QA Agent</h1>
  <p class="subtitle">Analyze and fix tracks for streaming platforms</p>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">🎵</div>
    <div class="upload-text">
      Drop a track here or <strong>click to browse</strong>
    </div>
    <div class="upload-text" style="margin-top:0.25rem; font-size:0.8rem;">
      WAV, FLAC, MP3, MP4, M4A, OGG, MOV
    </div>
    <input type="file" id="fileInput" accept=".wav,.flac,.mp3,.aif,.aiff,.ogg,.m4a,.mp4,.mov,.webm,.aac,.wma,.opus">
  </div>

  <div class="results" id="results">
    <!-- Track info -->
    <div class="section">
      <div class="track-header">
        <span class="track-name" id="trackName"></span>
        <span class="track-meta" id="trackMeta"></span>
      </div>
    </div>

    <!-- Loudness -->
    <div class="section">
      <div class="section-title">Loudness</div>
      <div id="loudnessMetrics"></div>
    </div>

    <!-- Silence -->
    <div class="section" id="silenceSection">
      <div class="section-title">Silence</div>
      <div id="silenceMetrics"></div>
    </div>

    <!-- Clipping -->
    <div class="section" id="clippingSection">
      <div class="section-title">Clipping</div>
      <div id="clippingMetrics"></div>
    </div>

    <!-- Platforms -->
    <div class="section">
      <div class="section-title">Platform Predictions</div>
      <div id="platformList"></div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="action-bar" id="actionBar"></div>
    </div>
  </div>
</div>

<script>
const uploadArea = document.getElementById("uploadArea");
const fileInput = document.getElementById("fileInput");
const results = document.getElementById("results");

uploadArea.addEventListener("click", () => fileInput.click());
uploadArea.addEventListener("dragover", e => { e.preventDefault(); uploadArea.classList.add("dragover"); });
uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("dragover"));
uploadArea.addEventListener("drop", e => {
  e.preventDefault();
  uploadArea.classList.remove("dragover");
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  uploadArea.classList.add("processing");
  uploadArea.innerHTML = '<div class="upload-icon"><span class="spinner"></span></div><div class="upload-text">Analyzing ' + file.name + '...</div>';
  results.classList.remove("visible");

  const form = new FormData();
  form.append("file", file);

  try {
    const res = await fetch("/api/analyze", { method: "POST", body: form });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Analysis failed");
    }
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    alert("Error: " + e.message);
  } finally {
    resetUpload();
  }
}

function resetUpload() {
  uploadArea.classList.remove("processing");
  uploadArea.innerHTML = '<div class="upload-icon">🎵</div><div class="upload-text">Drop a track here or <strong>click to browse</strong></div><div class="upload-text" style="margin-top:0.25rem;font-size:0.8rem;">WAV, FLAC, MP3, MP4, M4A, OGG, MOV</div>';
  fileInput.value = "";
}

function badge(severity) {
  return '<span class="badge badge-' + severity + '">' + severity.toUpperCase() + '</span>';
}

function icon(severity) {
  return { pass: "✅", warning: "⚠️", fail: "❌" }[severity] || "❓";
}

function metricRow(label, value) {
  return '<div class="metric-row"><span class="metric-label">' + label + '</span><span class="metric-value">' + value + '</span></div>';
}

function renderResults(d) {
  const t = d.track;
  document.getElementById("trackName").textContent = t.name;
  document.getElementById("trackMeta").textContent = t.duration + "s · " + t.sample_rate + " Hz · " + t.channels + "ch";

  const l = d.loudness;
  document.getElementById("loudnessMetrics").innerHTML =
    metricRow("Integrated LUFS", l.integrated_lufs + " LUFS") +
    metricRow("True Peak", l.true_peak_dbtp + " dBTP") +
    metricRow("Sample Peak", l.sample_peak_dbfs + " dBFS") +
    metricRow("Loudness Range", l.loudness_range_lu + " LU") +
    metricRow("Short-term Max", l.short_term_max_lufs + " LUFS");

  if (d.silence) {
    const s = d.silence;
    const leadStr = (s.leading_ms / 1000).toFixed(2) + "s" + (s.leading_trimmed ? " ← trim" : "");
    const trailStr = (s.trailing_ms / 1000).toFixed(2) + "s" + (s.trailing_trimmed ? " ← trim" : "");
    document.getElementById("silenceMetrics").innerHTML =
      metricRow("Leading", leadStr) + metricRow("Trailing", trailStr);
    document.getElementById("silenceSection").style.display = "";
  } else {
    document.getElementById("silenceSection").style.display = "none";
  }

  if (d.clipping) {
    const c = d.clipping;
    let html = "";
    if (c.has_clipping) {
      html = '<div>' + icon(c.severity) + " " + c.clip_count + " clipped regions detected " + badge(c.severity) + '</div>';
      html += '<div class="clip-detail">' + c.clipped_samples + " samples affected (" + c.clip_percentage + "%)</div>";
    } else {
      html = '<div>✅ No clipping detected</div>';
    }
    document.getElementById("clippingMetrics").innerHTML = html;
    document.getElementById("clippingSection").style.display = "";
  } else {
    document.getElementById("clippingSection").style.display = "none";
  }

  let platformHTML = "";
  d.platforms.forEach(p => {
    let delta = "";
    if (p.delta_db < 0) delta = "reduced by " + Math.abs(p.delta_db) + " dB";
    else if (p.delta_db > 0) delta = "boosted by " + p.delta_db + " dB";
    else delta = "no change";

    const peakStr = p.peak_compliant ? "OK" : "CLIP RISK";

    platformHTML += '<div class="platform-row">' +
      '<span>' + icon(p.severity) + '</span>' +
      '<span class="platform-name">' + p.name + '</span>' +
      '<span class="platform-delta">Loudness: ' + delta + '</span>' +
      '<span>' + badge(p.peak_compliant ? "pass" : "fail") + '</span>' +
      '</div>';
  });
  document.getElementById("platformList").innerHTML = platformHTML;

  let actionHTML = "";
  if (d.fixed_filename) {
    actionHTML += '<a class="btn btn-primary" href="/api/download/' + d.fixed_filename + '">⬇ Download Fixed</a>';
  }
  if (d.actions.includes("flag_for_review")) {
    actionHTML += '<span class="action-msg">⚠️ Clipping detected — review recommended</span>';
  }
  if (d.actions.length === 1 && d.actions[0] === "no_action") {
    actionHTML += '<span class="action-msg">✅ Track is platform-ready — no fixes needed</span>';
  }
  document.getElementById("actionBar").innerHTML = actionHTML;

  results.classList.add("visible");
}
</script>
</body>
</html>
